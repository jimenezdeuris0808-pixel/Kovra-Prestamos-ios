# Antes de que este workflow corra, hay que configurar en la UI de Codemagic
# (Team settings, una sola vez):
#   1. App Store Connect integration: nombrala "kovra_app_store_connect"
#      (API key generada en appstoreconnect.apple.com > Users and Access > Keys).
#   2. Code signing: subir el certificado de distribucion (.p12) en
#      Team settings > Code signing identities -- Codemagic puede generarlo
#      el solo si le das permiso via la misma integracion de App Store Connect.
#   3. Conectar este repo (GitHub) como la fuente del proyecto.
workflows:
  ios-testflight:
    name: Kovra Mobile - iOS (TestFlight)
    max_build_duration: 60
    integrations:
      app_store_connect: kovra_app_store_connect
    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.kovra.kovraMobile"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
    scripts:
      - name: Instalar dependencias de Flutter
        script: flutter packages pub get

      - name: Inicializar keychain para firma de codigo
        script: keychain initialize

      - name: Configuracion de firma automatica (App Store Connect)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Importar certificado al keychain
        script: keychain add-certificates

      - name: Aplicar perfiles de firma al proyecto Xcode
        script: xcode-project use-profiles

      - name: Instalar CocoaPods
        script: |
          find . -name "Podfile" -maxdepth 2 -execdir pod install \;

      - name: Build iOS (ipa)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # `submit_to_testflight` en false (y sin `beta_groups`) a proposito.
        # El grupo interno "Equipo Kovra" tiene distribucion AUTOMATICA en
        # App Store Connect: recibe cada build nuevo apenas Apple termina de
        # procesarlo, sin que Codemagic tenga que "agregarlo" explicitamente
        # -- de hecho, intentarlo (`beta_groups: ["Equipo Kovra"]`) da error
        # ("Cannot add internal group to a build") porque un grupo
        # automatico no acepta asignacion manual. Y `submit_to_testflight:
        # true` sin `beta_groups` intenta ADEMAS enviar a revision EXTERNA,
        # lo que fallaba en cada build mientras el build #1 siguiera
        # atascado en esa cola ("Another build is in review"). Con
        # `submit_to_testflight: false`, el .ipa igual se sube y publica a
        # App Store Connect (eso es lo que hace disponible el build para
        # "Equipo Kovra" automaticamente) pero sin disparar ninguno de los
        # dos intentos que fallaban.
        submit_to_testflight: false
        # Cambia a true solo cuando quieras enviarlo tambien a revision
        # de App Store (no hace falta para instalar via TestFlight).
        submit_to_app_store: false
